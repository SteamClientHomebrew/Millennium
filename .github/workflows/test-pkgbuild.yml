name: Test Arch PKGBUILD

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: pkgbuild-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pkgbuild:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Setup pacman and paru
        run: |
          # Enable multilib for 32-bit builds
          sed -i '/\[multilib\]/,/Include/s/^#//' /etc/pacman.conf
          pacman -Syu --noconfirm
          pacman -S --noconfirm git rust

          # Create build user (paru/makepkg refuse to run as root)
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          # Build paru from source so it links against the current libalpm
          su builder -c 'cd /tmp && git clone https://aur.archlinux.org/paru.git && cd paru && makepkg -si --noconfirm'

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build package
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Prepare build directory with PKGBUILD
          cp -r packages/arch /home/builder/pkg
          # Remove steam from runtime depends (unavailable in CI)
          sed -i "s/'steam'//" /home/builder/pkg/PKGBUILD
          # Pre-populate srcdir with the local checkout so makepkg skips cloning
          mkdir -p /home/builder/pkg/src
          cp -r "$GITHUB_WORKSPACE" /home/builder/pkg/src/Millennium
          chown -R builder:builder /home/builder/pkg
          su builder -c "git config --global --add safe.directory /home/builder/pkg/src/Millennium"
          # Use paru as the pacman command so makepkg can resolve AUR deps (e.g. bun)
          su builder -c 'cd /home/builder/pkg && PACMAN=paru makepkg -s --noconfirm --noextract'

      - name: Verify package
        run: |
          echo "Built packages:"
          ls -lh /home/builder/pkg/*.pkg.tar.zst
          echo ""
          echo "Package contents:"
          tar -tf /home/builder/pkg/*.pkg.tar.zst | grep -E '\.(so|so\.[0-9]|$)' | head -20
