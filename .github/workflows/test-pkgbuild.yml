name: Test Arch PKGBUILD

on:
  pull_request:
    paths:
      - "packages/arch/**"
      - "src/**"
      - "CMakeLists.txt"
      - "CMakePresets.json"
  workflow_dispatch:

concurrency:
  group: pkgbuild-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-pkgbuild:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Setup pacman and dependencies
        run: |
          # Enable multilib for 32-bit builds
          sed -i '/\[multilib\]/,/Include/s/^#//' /etc/pacman.conf
          pacman -Syu --noconfirm
          pacman -S --noconfirm git curl zip unzip tar cmake ninja lib32-gcc-libs

      - name: Install bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Patch PKGBUILD to use local source
        run: |
          COMMIT=$(git rev-parse HEAD)
          REPO_DIR=$(pwd)
          cd packages/arch
          # Point source at the local checkout instead of cloning from GitHub
          sed -i "s|source=(\"git+\$url\.git.*\")|source=(\"git+file://${REPO_DIR}/.git#commit=${COMMIT}\")|" PKGBUILD
          # Remove bun-bin makedepend since we installed bun directly
          sed -i "s/'bun-bin' //" PKGBUILD

      - name: Build package
        run: |
          cp -r packages/arch /home/builder/pkg
          chown -R builder:builder /home/builder/pkg
          # Ensure bun is available to the builder user
          cp -r "$HOME/.bun" /home/builder/.bun
          chown -R builder:builder /home/builder/.bun
          su builder -c 'export PATH="$HOME/.bun/bin:$PATH" && cd /home/builder/pkg && makepkg -s --noconfirm'

      - name: Verify package
        run: |
          echo "Built packages:"
          ls -lh /home/builder/pkg/*.pkg.tar.zst
          echo ""
          echo "Package contents:"
          tar -tf /home/builder/pkg/*.pkg.tar.zst | grep -E '\.(so|so\.[0-9]|$)' | head -20
