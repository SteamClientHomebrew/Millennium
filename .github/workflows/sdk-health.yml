name: SDK Health

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - name: Fetch latest SteamTracking SHA
        id: fetch
        run: |
          SHA=$(curl -s "https://api.github.com/repos/SteamTracking/SteamTracking/commits/master" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Restore SHA cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: .steamtracking-sha
          key: steamtracking-${{ steps.fetch.outputs.sha }}

      - name: Evaluate
        id: compare
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Save SHA cache
        if: steps.compare.outputs.changed == 'true'
        run: touch .steamtracking-sha

      - uses: actions/cache/save@v4
        if: steps.compare.outputs.changed == 'true'
        with:
          path: .steamtracking-sha
          key: steamtracking-${{ steps.fetch.outputs.sha }}

  sdk-health:
    needs: check-upstream
    if: needs.check-upstream.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            build-essential gcc-multilib g++-multilib libc6-dev-i386 \
            ninja-build libssl-dev:i386 pkg-config:i386

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.28"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="/usr/lib/i386-linux-gnu/pkgconfig:/usr/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="/usr/lib/i386-linux-gnu/pkgconfig"
          cmake --preset linux-debug

      - name: Build sdk_health
        run: cmake --build build --parallel $(nproc) --target sdk_health

      - name: Install Steam and xvfb
        run: |
          echo "steam steam/question select I AGREE" | sudo debconf-set-selections
          echo "steam steam/license note ''"         | sudo debconf-set-selections
          sudo apt-get install -y xvfb steam

      - name: Authenticate Steam
        env:
          STEAM_USER: ${{ secrets.STEAM_USER }}
          STEAM_PASS: ${{ secrets.STEAM_PASS }}
        run: |
          xvfb-run -a steam -login "$STEAM_USER" "$STEAM_PASS" -silent -nofriendsui -nochatui &
          SPID=$!
          for i in $(seq 1 60); do
            if [ -f "$HOME/.steam/steam/config/loginusers.vdf" ]; then
              echo "session files written"
              break
            fi
            sleep 1
          done
          kill $SPID 2>/dev/null || true
          wait $SPID 2>/dev/null || true

      - name: Run SDK health check
        id: health
        run: build/sdk_health --dump-file dump.json
        continue-on-error: true

      - name: Print dump on failure
        if: steps.health.outcome == 'failure'
        run: |
          if [ -f dump.json ]; then
            echo "=== dump.json ==="
            cat dump.json
          else
            echo "(no dump file written)"
          fi

      - name: Fail
        if: steps.health.outcome == 'failure'
        run: exit 1
