name: Bug Report
description: Create a bug report to help us find and fix bugs!
title: "[Bug 🪲]: "
labels: [bug]
body:
- type: checkboxes
  attributes:
    label: Before Reporting
    description: "I have double checked and agree with the following:"
    options:
    - label: I found no existing issues matching my bug
      required: true
    - label: My issue is not caused by a theme
      required: true
    - label: My issue is not caused by a plugin
      required: true
- type: dropdown
  attributes:
    label: Operating System
    options:
      - Windows
      - Linux
  validations:
    required: true
- type: dropdown
  attributes:
    label: Linux Distribution
    description: If you're on Linux, which distribution are you using? Select "Not applicable" otherwise.
    options:
      - Not applicable
      - Alpine
      - Arch Linux
      - Artix Linux
      - CachyOS
      - CentOS
      - Debian
      - Deepin
      - Elementary OS
      - EndeavourOS
      - Fedora
      - Garuda Linux
      - Gentoo
      - KDE Neon
      - Kali Linux
      - Linux Mint
      - MX Linux
      - Manjaro
      - Nobara
      - NixOS
      - OpenSUSE Leap
      - OpenSUSE Tumbleweed
      - Parrot OS
      - Pop!_OS
      - Raspberry Pi OS
      - RHEL
      - Rocky Linux
      - Slackware
      - Solus
      - Ubuntu
      - Void Linux
      - Zorin OS
      - Other (write in issue description)
  validations:
    required: false
- type: checkboxes
  attributes:
    label: Linux Confirmations
    description: If you're on Linux, please confirm the following. Otherwise, skip this section.
    options:
    - label: I am not a NixOS user.
      required: false
- type: markdown
  attributes:
    value: |
      SteamClientHomebrew does not maintain the NixOS package, all contributions are made by external contributors like you! If you'd like to discuss or report issues to other NixOS users, checkout the [NixOS MegaThread](https://github.com/SteamClientHomebrew/Millennium/issues/551)
- type: textarea
  attributes:
    label: Describe the Bug
    description: A clear and concise description of what you're experiencing. If applicable, add screenshots to help explain your problem.
  validations:
    required: true
- type: textarea
  attributes:
    label: Steps To Reproduce
    description: Steps to reproduce the behavior.
    placeholder: |
      1. In this environment...
      2. With this config...
      3. Run '...'
      4. See error...
  validations:
    required: true
- type: textarea
  attributes:
    label: Anything else?
    description: |
      Links? References? Anything that will give us more context about the issue you are encountering!
      Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
  validations:
    required: false
