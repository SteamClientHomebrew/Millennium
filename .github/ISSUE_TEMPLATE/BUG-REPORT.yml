name: Bug Report
description: Create a bug report to help us find and fix bugs!
title: "[Bug 🪲]: "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Before Reporting
      description: "I have double checked and agree with the following:"
      options:
        - label: I found no existing issues matching my bug
          required: true
        - label: My issue is not caused by a theme
          required: true
        - label: My issue is not caused by a plugin
          required: true
  - type: dropdown
    attributes:
      label: Operating System
      description: Which computer operating system are you using?
      options:
        - Windows
        - Linux
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        &nbsp;

        ### Linux users only
        If you're on Linux, please fill out the section below. Otherwise, skip it.

        **NOTE:** NixOS Users

        SteamClientHomebrew does not maintain the NixOS package, all contributions are made by external contributors like you!
        If you'd like to discuss or report issues with other NixOS users, check out the [NixOS MegaThread](https://github.com/SteamClientHomebrew/Millennium/issues/551).
  - type: dropdown
    attributes:
      label: Linux Distribution
      description: Which distribution are you using?
      options:
        - Not applicable
        - Alpine
        - Arch Linux
        - Artix Linux
        - CachyOS
        - CentOS
        - Debian
        - Deepin
        - Elementary OS
        - EndeavourOS
        - Fedora
        - Garuda Linux
        - Gentoo
        - KDE Neon
        - Kali Linux
        - Linux Mint
        - MX Linux
        - Manjaro
        - Nobara
        - OpenSUSE Leap
        - OpenSUSE Tumbleweed
        - Parrot OS
        - Pop!_OS
        - Raspberry Pi OS
        - RHEL
        - Rocky Linux
        - Slackware
        - Solus
        - Ubuntu
        - Void Linux
        - Zorin OS
        - Other (write in issue description)
    validations:
      required: false
  - type: dropdown
    attributes:
      label: Linux Install Method
      description: How did you install Millennium?
      options:
        - Not applicable
        - Install Script (curl -fsSL "https://steambrew.app/install.sh" | bash)
        - Arch User Repository (AUR)
        - Other (write in issue description)
    validations:
      required: false
  - type: textarea
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what you're experiencing. If applicable, add screenshots to help explain your problem.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. In this environment...
        2. With this config...
        3. Run '...'
        4. See error...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!
        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
